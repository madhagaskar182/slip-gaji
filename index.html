<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Akses Slip Gaji Pegawai</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #0f172a, #1e293b); color: white; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md bg-gray-900 p-8 rounded-2xl shadow-2xl border border-gray-700">
    <h1 class="text-3xl font-bold text-center mb-2">Akses Slip Gaji</h1>
    <p class="text-gray-400 text-center mb-8">Masukkan data pegawai</p>

    <form id="form" class="space-y-5">
      <input type="text" id="nomor" placeholder="Nomor Pegawai (contoh: 001234)" required class="w-full px-5 py-3 bg-gray-800 border border-gray-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" />

      <select id="bulan" required class="w-full px-5 py-3 bg-gray-800 border border-gray-700 rounded-xl">
        <option value="" disabled selected>Pilih Bulan</option>
        <option value="01">Januari</option><option value="02">Februari</option><option value="03">Maret</option>
        <option value="04">April</option><option value="05">Mei</option><option value="06">Juni</option>
        <option value="07">Juli</option><option value="08">Agustus</option><option value="09">September</option>
        <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
      </select>

      <input type="number" id="tahun" placeholder="Tahun (contoh: 2026)" min="2020" max="2030" required class="w-full px-5 py-3 bg-gray-800 border border-gray-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" />

      <button type="submit" class="w-full py-4 bg-blue-600 hover:bg-blue-700 rounded-xl text-lg font-semibold transition">
        Buka File
      </button>
    </form>

    <div id="status" class="mt-6 text-center text-sm min-h-[1.5rem]"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
