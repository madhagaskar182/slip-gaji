<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Viewer PDF Scroll</title>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(to bottom, #e0f2fe, #bae6fd);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 700px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.12);
      text-align: center;
    }

    input, select, button {
      width: 100%;
      padding: 0.8rem;
      margin-top: 0.6rem;
      border-radius: 8px;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    #viewerContainer {
      margin-top: 20px;
      display: none;
      max-height: 70vh;
      overflow-y: auto;
      border: 1px solid #ccc;
      padding: 10px;
      border-radius: 10px;
      background: #f8fafc;
    }

    canvas {
      width: 100%;
      margin-bottom: 15px;
      border: 1px solid #ddd;
    }

    .download-btn {
      background: #16a34a;
      margin-top: 10px;
    }

    .error {
      color: red;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Viewer PDF Scroll</h2>

  <form id="pdfForm">
   <select id="tahun" required>
      <option value="">Tahun</option>
      <option value="2025">2025</option>
      <option value="2026">2026</option>
      <option value="2027">2027</option>
    </select>

    <select id="bulan" required>
      <option value="">Bulan</option>
      <option value="01">Januari</option>
      <option value="02">Februari</option>
      <option value="03">Maret</option>
      <option value="04">April</option>
      <option value="05">Mei</option>
      <option value="06">Juni</option>
      <option value="07">Juli</option>
      <option value="08">Agusstus</option>
      <option value="09">September</option>
      <option value="10">Oktober</option>
      <option value="11">November</option>
      <option value="12">Desember</option>
    </select>

    <input type="text" id="nama" placeholder="Nama file" required />

    <button type="submit">Tampilkan PDF</button>
  </form>

  <button id="downloadBtn" class="download-btn">⬇ Download PDF</button>

  <div id="pesan"></div>
  <div id="error" class="error"></div>

  <div id="viewerContainer"></div>
</div>

<script src="script.js"></script>

</body>
</html>
