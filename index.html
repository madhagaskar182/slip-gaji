<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Akses PDF - Langsung Buka / Download</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(to bottom, #e0f2fe, #bae6fd);
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.12);
      text-align: center;
    }
    h1 {
      color: #1e40af;
      margin: 0 0 1.8rem;
      font-size: 1.6rem;
    }
    label {
      display: block;
      margin: 1.2rem 0 0.5rem;
      font-weight: 500;
      color: #334155;
      text-align: left;
    }
    input, select {
      width: 100%;
      padding: 0.85rem;
      border: 1px solid #94a3b8;
      border-radius: 8px;
      font-size: 1rem;
      box-sizing: border-box;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    button {
      width: 100%;
      margin-top: 2rem;
      padding: 1rem;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }
    .message {
      margin-top: 1.5rem;
      font-size: 0.95rem;
      color: #475569;
    }
    .error {
      color: #dc2626;
      font-weight: 500;
      margin-top: 1rem;
    }
    .info {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #64748b;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Slip Gaji RRI Tahuna</h1>

  <form id="pdfForm">
    <label for="tahun">Tahun</label>
    <select id="tahun" required>
      <option value="">Pilih tahun...</option>
      <option value="2026">2026</option>
      <option value="2027">2027</option>
      <option value="2028">2028</option>
      <!-- tambah tahun lain jika perlu -->
    </select>

    <label for="bulan">Bulan</label>
    <select id="bulan" required>
      <option value="">Pilih bulan...</option>
      <option value="01_Januari">Januari</option>
      <option value="02_Februari">Februari</option>
      <option value="03_Maret">Maret</option>
      <option value="04_April">April</option>
      <option value="05_Mei">Mei</option>
      <option value="06_Juni">Juni</option>
      <option value="07_Juli">Juli</option>
      <option value="08_Agustus">Agustus</option>
      <option value="09_September">September</option>
      <option value="10_Oktober">Oktober</option>
      <option value="11_November">November</option>
      <option value="12_Desember">Desember</option>
    </select>

    <label for="nama">NIP / NIPPPK</label>
    <input type="text" id="nama" placeholder="Contoh: 199601292022031004" required />

    <button type="submit">Download</button>
  </form>

  <div id="pesan" class="message"></div>
  <div id="error" class="error"></div>

  <div class="info">
    File akan dibuka langsung di tab baru.<br>
    Jika tidak terbuka otomatis → klik kanan → "Save link as..." untuk download.
  </div>
</div>

<script>
  const form = document.getElementById('pdfForm');
  const pesan = document.getElementById('pesan');
  const errorDiv = document.getElementById('error');

  form.addEventListener('submit', function(e) {
    e.preventDefault();

    const tahun = document.getElementById('tahun').value;
    const bulan = document.getElementById('bulan').value;
    const nama = document.getElementById('nama').value.trim();

    errorDiv.textContent = '';
    pesan.textContent = '';

    if (!tahun || !bulan || !nama) {
      errorDiv.textContent = 'Harap isi semua kolom!';
      return;
    }

    const baseUrl = 'https://raw.githubusercontent.com/madhagaskar182/testing/main/files/';
    const filePath = `${tahun}/${bulan}/${nama}.pdf`;
    const fullUrl = baseUrl + filePath;


    // Membuka di tab baru
    const newTab = window.open(fullUrl, '_blank');

    // Cek apakah popup diblokir
    if (!newTab || newTab.closed || typeof newTab.closed === 'undefined') {
      errorDiv.textContent = 'Popup diblokir browser. Silakan izinkan popup atau klik link ini:';
      
      const link = document.createElement('a');
      link.href = fullUrl;
      link.textContent = 'Klik di sini untuk download PDF';
      link.target = '_blank';
      link.style.display = 'block';
      link.style.marginTop = '1rem';
      link.style.color = '#2563eb';
      link.style.fontWeight = '500';
      
      pesan.innerHTML = '';
      pesan.appendChild(link);
    } else {
      setTimeout(() => {
        pesan.textContent = 'File sedang dimuat di tab baru...';
      }, 800);
    }
  });
</script>

</body>
</html>
