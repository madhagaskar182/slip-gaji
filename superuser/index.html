<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel Pro</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>

<!-- LOGIN PANEL -->
<div id="loginPanel" class="h-screen flex items-center justify-center">
  <div class="bg-white shadow-xl rounded-lg p-8 w-96">
    <h1 class="text-2xl font-bold mb-6 text-center">Admin Login</h1>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button id="loginBtn">Login</button>
    <p id="loginError" class="text-red-500 mt-2 hidden">Username atau password salah</p>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden flex h-screen">
  <!-- Sidebar -->
  <div class="w-64 bg-gray-800 text-white flex flex-col">
    <div class="text-center font-bold text-xl py-6 border-b border-gray-700">Admin Panel</div>
    <ul class="flex-1">
      <li><button class="menuBtn" data-menu="dashboard">Dashboard</button></li>
      <li><button class="menuBtn" data-menu="generateJson">Generate JSON</button></li>
      <li><button class="menuBtn" data-menu="uploadPdf">Upload PDF</button></li>
    </ul>
    <button id="logoutBtn">Log Out</button>
  </div>

  <!-- CONTENT -->
  <div class="flex-1 p-6 overflow-auto">
    <!-- Dashboard -->
    <div id="dashboard" class="menuContent hidden">
      <h2>Dashboard</h2>
      <div class="flex gap-4 mb-4">
        <select id="selectYear"></select>
        <select id="selectMonth"></select>
      </div>
      <input type="text" id="githubToken" placeholder="GitHub Token">
      <button id="loadFiles">Tampilkan File</button>
      <ul id="fileList"></ul>
    </div>

    <!-- Generate JSON -->
    <div id="generateJson" class="menuContent hidden">
      <div id="dropZoneExcel">
        Drag & Drop file Excel di sini atau klik
        <input type="file" id="excelInput" accept=".xlsx" multiple class="hidden">
      </div>
      <div id="uploadedFiles"></div>
      <button id="generateJsonBtn">Generate JSON</button>
      <pre id="jsonPreview"></pre>
      <button id="uploadJsonBtn">Upload JSON ke GitHub</button>
    </div>

    <!-- Upload PDF -->
    <div id="uploadPdf" class="menuContent hidden">
      <select id="pdfYear"></select>
      <select id="pdfMonth"></select>
      <div id="dropZonePdf">
        Drag & Drop file PDF di sini atau klik
        <input type="file" id="pdfInput" accept=".pdf" multiple class="hidden">
      </div>
      <div id="pdfFilesList"></div>
      <button id="uploadPdfBtn">Upload PDF</button>
      <div id="pdfLoading">
        <div id="pdfProgress">0%</div>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="utils.js"></script>
<script src="app_pro.js"></script>
</body>
</html>
