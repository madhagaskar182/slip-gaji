<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<!-- CSS dari folder superuser -->
<link rel="stylesheet" href="superuser/style-admin.css">

<!-- JS -->
<script defer src="admin.js"></script>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login-box">
  <h2>🔐 Login Admin</h2>

  <form onsubmit="event.preventDefault(); login();">
    
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Masukkan username" required>

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Masukkan password" required>

    <button type="submit" class="btn-primary">Login</button>
  </form>

  <p id="loginError" class="error-text"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="container hidden">

  <h2>🧑‍💼 Generator JSON Pegawai</h2>

  <div class="top-actions">
    <button type="button" class="btn-primary" onclick="tambahBaris()">➕ Tambah</button>
    <button type="button" class="btn-success" onclick="generateJSON()">🚀 Generate</button>
    <button type="button" class="btn-copy" onclick="copyJSON()">📋 Copy</button>
    <button type="button" class="btn-danger" onclick="logout()">🚪 Logout</button>
  </div>

  <div class="table-wrapper">
    <table id="table">
      <thead>
        <tr>
          <th>NIP</th>
          <th>Nama File</th>
          <th>Password</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><input type="text" placeholder="NIP"></td>
          <td><input type="text" placeholder="Nama File PDF"></td>
          <td><input type="text" placeholder="Password"></td>
          <td>
            <button type="button" class="btn-danger" onclick="hapusBaris(this)">❌</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="output" id="output"></div>

</div>

</body>
</html>
