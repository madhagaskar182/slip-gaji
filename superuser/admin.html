<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
/* GLOBAL */
body {
  font-family: 'Segoe UI', monospace;
  background: #020617;
  color: #e2e8f0;
  margin: 0;
  padding: 20px;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
}

/* CARD */
.card {
  background: #0f172a;
  padding: 25px;
  border-radius: 18px;
  box-shadow: 0 0 60px rgba(0,0,0,0.7);
}

/* HEADER */
.header {
  margin-bottom: 20px;
}

.title {
  font-size: 24px;
  font-weight: bold;
}

/* DROP AREA */
.drop-area {
  border: 2px dashed #334155;
  border-radius: 12px;
  padding: 30px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
}

.drop-area.dragover {
  border-color: #3b82f6;
  background: rgba(59,130,246,0.1);
}

.drop-area p {
  margin: 0;
  color: #64748b;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.btn-generate {
  background: #3b82f6;
  color: white;
}

.btn-generate:hover {
  background: #2563eb;
}

/* OUTPUT */
textarea {
  width: 100%;
  height: 250px;
  margin-top: 15px;
  background: #000;
  color: #22c55e;
  border-radius: 10px;
  padding: 15px;
  font-family: monospace;
  font-size: 13px;
}

/* STATUS */
.status {
  margin-top: 10px;
  font-size: 13px;
  color: #38bdf8;
}

/* LOADING */
.loading {
  color: #facc15;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="header">
      <div class="title">⚡ JSON Generator </div>
    </div>

    <!-- DROP AREA -->
    <div class="drop-area" id="dropArea">
      <p>📂 Drag & Drop Excel di sini atau klik</p>
      <input type="file" id="fileInput" accept=".xlsx,.xls" hidden>
    </div>

    <button class="btn-generate" onclick="prosesExcel()">Generate & Download JSON</button>

    <div class="status" id="status"></div>

    <textarea id="output" placeholder="Preview JSON muncul di sini..."></textarea>

  </div>
</div>

<script>
let fileGlobal = null;

// DRAG & DROP
const dropArea = document.getElementById("dropArea");
const fileInput = document.getElementById("fileInput");

dropArea.addEventListener("click", () => fileInput.click());

fileInput.addEventListener("change", (e) => {
  fileGlobal = e.target.files[0];
  dropArea.querySelector("p").textContent = "📄 " + fileGlobal.name;
});

dropArea.addEventListener("dragover", (e) => {
  e.preventDefault();
  dropArea.classList.add("dragover");
});

dropArea.addEventListener("dragleave", () => {
  dropArea.classList.remove("dragover");
});

dropArea.addEventListener("drop", (e) => {
  e.preventDefault();
  dropArea.classList.remove("dragover");

  fileGlobal = e.dataTransfer.files[0];
  dropArea.querySelector("p").textContent = "📄 " + fileGlobal.name;
});

// HASH
async function hashPassword(password) {
  const encoder = new TextEncoder();
  const data = encoder.encode(password);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hashBuffer))
    .map(b => b.toString(16).padStart(2, '0')).join('');
}

// PROSES
async function prosesExcel() {
  const status = document.getElementById("status");

  if (!fileGlobal) {
    alert("Upload file dulu!");
    return;
  }

  status.textContent = "⏳ Memproses...";
  status.classList.add("loading");

  const reader = new FileReader();

  reader.onload = async function(e) {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, { type: 'array' });

    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const jsonData = XLSX.utils.sheet_to_json(sheet);

    let result = {};
    let count = 0;

    for (let row of jsonData) {
      const email = (row.email || "").toLowerCase().trim();
      const namaFile = (row.namaFile || "").toUpperCase().trim();
      const password = (row.password || "").toString().trim();

      if (!email || !namaFile || !password) continue;

      const hashed = await hashPassword(password);

      result[email] = {
        namaFile: namaFile,
        password: hashed
      };

      count++;
    }

    const jsonString = JSON.stringify(result, null, 2);

    document.getElementById("output").value = jsonString;

    // AUTO DOWNLOAD
    const blob = new Blob([jsonString], { type: "application/json" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "dataPegawai.json";
    link.click();

    status.textContent = "✅ Berhasil! " + count + " data diproses & file didownload";
    status.classList.remove("loading");
  };

  reader.readAsArrayBuffer(fileGlobal);
}
</script>

</body>
</html>
